<!-- Página de contacto: formulario para enviar mensajes y lista de mensajes enviados -->

<ion-header>
  <ion-toolbar style="--background:#0a1628; --color:white;">
    <ion-buttons slot="start">
      <ion-menu-button style="color:white;"></ion-menu-button>
    </ion-buttons>
    <ion-title style="color:white;">Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background:#0f447c;">

  <!-- Banner superior -->
  <div style="background: linear-gradient(180deg, #1e3f5f 0%, #043a85 100%);
              padding: 30px 24px 24px 24px; text-align:center;
              border-bottom: 1px solid rgba(255,255,255,0.08);">
    <h1 style="color:white; font-size:28px; font-weight:900;
               margin:0 0 6px 0; letter-spacing:-0.5px;">
      Contáctanos
    </h1>
    <p style="color:rgba(255,255,255,0.75); font-size:12px;
              margin:0; letter-spacing:2px; text-transform:uppercase;">
      Envíanos un mensaje
    </p>
  </div>

  <div style="padding:24px; display:flex; flex-direction:column; align-items:center;">

    <!-- Tarjeta del formulario -->
    <div style="width:100%; max-width:380px; background:white;
                border-radius:16px; padding:24px;
                box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:24px;">

      <h2 style="font-size:18px; font-weight:800; color:#1e3a5f;
                 margin:0 0 4px 0; text-align:center;">Nuevo mensaje</h2>
      <p style="font-size:13px; color:#000; margin:0 0 20px 0; text-align:center;">
        Completa el formulario y te responderemos
      </p>

      <!-- Campo nombre -->
      <div style="margin-bottom:12px;">
        <ion-item style="--background:#f8f9fa; --border-radius:10px;
                         --border-color:#e0e0e0; --border-width:1px;
                         --border-style:solid;">
          <ion-icon name="person-outline" slot="start"
                    style="color:#2e5fa3;"></ion-icon>
          <ion-label position="floating"
                     style="color:#000;">Nombre</ion-label>
          <ion-input [(ngModel)]="nombre" type="text"
                     style="color:#111;"></ion-input>
        </ion-item>
      </div>

      <!-- Campo correo -->
      <div style="margin-bottom:12px;">
        <ion-item style="--background:#f8f9fa; --border-radius:10px;
                         --border-color:#e0e0e0; --border-width:1px;
                         --border-style:solid;">
          <ion-icon name="mail-outline" slot="start"
                    style="color:#2e5fa3;"></ion-icon>
          <ion-label position="floating"
                     style="color:#000;">Correo</ion-label>
          <ion-input [(ngModel)]="correo" type="email"
                     style="color:#111;"></ion-input>
        </ion-item>
      </div>

      <!-- Campo mensaje -->
      <div style="margin-bottom:20px;">
        <ion-item style="--background:#f8f9fa; --border-radius:10px;
                         --border-color:#e0e0e0; --border-width:1px;
                         --border-style:solid;">
          <ion-icon name="chatbox-outline" slot="start"
                    style="color:#2e5fa3;"></ion-icon>
          <ion-label position="floating"
                     style="color:#000;">Mensaje</ion-label>
          <ion-textarea [(ngModel)]="mensaje" rows="4"
                        style="color:#111;"></ion-textarea>
        </ion-item>
      </div>

      <!-- Botón enviar -->
      <ion-button expand="block" (click)="enviar()"
                  style="--background:#1e3a5f; --background-activated:#152d4a;
                         --border-radius:10px; --color:white;
                         font-weight:700; font-size:15px; height:48px;">
        <ion-icon name="send-outline" slot="start"></ion-icon>
        Enviar mensaje
      </ion-button>

    </div>

    <!-- Lista de mensajes enviados -->
    <div *ngIf="mensajesEnviados.length > 0"
         style="width:100%; max-width:380px;">

      <h3 style="font-size:13px; font-weight:700; color:rgba(255,255,255,0.6);
                 margin:0 0 12px 4px; letter-spacing:1px; text-transform:uppercase;">
        Mensajes enviados ({{ mensajesEnviados.length }})
      </h3>

      <!-- Tarjeta por cada mensaje -->
      <div *ngFor="let m of mensajesEnviados; let i = index"
           style="background:white; border-radius:16px; padding:16px;
                  margin-bottom:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08);">

        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
          <!-- Avatar con inicial -->
          <div style="width:40px; height:40px; border-radius:50%; flex-shrink:0;
                      background:linear-gradient(135deg, #1e3a5f, #2e5fa3);
                      display:flex; align-items:center; justify-content:center;">
            <span style="color:white; font-size:16px; font-weight:700;">
              {{ m.nombre.charAt(0).toUpperCase() }}
            </span>
          </div>
          <div style="flex:1;">
            <p style="font-size:14px; font-weight:700; color:#1e3a5f; margin:0;">
              {{ m.nombre }}
            </p>
            <p style="font-size:12px; color:#2e5fa3; margin:0;">{{ m.correo }}</p>
          </div>
          <span style="font-size:11px; color:#888;">#{{ i + 1 }}</span>
        </div>

        <div style="height:1px; background:#f0f0f0; margin-bottom:10px;"></div>

        <p style="font-size:13px; color:#555; margin:0; line-height:1.5;">
          {{ m.mensaje }}
        </p>

      </div>

    </div>

  </div>

</ion-content>
